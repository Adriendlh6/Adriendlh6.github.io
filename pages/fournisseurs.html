<section class="card">
  <h2>Ajouter un fournisseur</h2>
  <form id="fournisseur-form" class="form-grid">
    <div class="field"><label>Nom</label><input name="nom" required></div>
    <div class="field"><label>Contact</label><input name="contact"></div>
    <div class="field"><label>Téléphone</label><input name="telephone"></div>
    <div class="field"><label>Email</label><input name="email"></div>
    <div class="field full"><label>Notes</label><textarea name="notes"></textarea></div>
    <div class="toolbar field full"><button class="btn primary" type="submit">Enregistrer le fournisseur</button></div>
  </form>
</section>
<section class="card">
  <h2>Fournisseurs</h2>
  <div id="fournisseurs-list" class="list"></div>
</section>
