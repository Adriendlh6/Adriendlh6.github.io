<section class="card">
  <h2>Sauvegarde locale</h2>
  <div class="toolbar">
    <button id="export-btn" class="btn ok" type="button">Exporter la base locale</button>
    <label class="btn secondary" for="import-file">Importer un JSON</label>
    <input id="import-file" type="file" accept="application/json" class="hidden">
    <button id="reset-btn" class="btn danger" type="button">Réinitialiser</button>
  </div>
  <div class="notice" style="margin-top:12px">Les données sont stockées localement dans le navigateur via IndexedDB. Pense à exporter régulièrement un fichier JSON.</div>
</section>
